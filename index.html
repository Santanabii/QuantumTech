<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumTech-Premium Technologies</title>
  <meta name="description" content="Discover cutting-edge gadgets with fast delivery"/>
  <meta name="keywords" content="tech gadgets,affordable tech accessories,top smartphone comparisons,latest technology news"/>
  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

  </style>
</head>
<body>
    <header>
    <div class="container">
      <h1 id="logo">QuantumTech</h1>
      <p>Next-Gen Gadgets for the Future</p>
    </div>

 <div class="controls">
    <select>
      <option>Sort by Price</option>
      <option>Low to High</option>
      <option>High to Low</option>
    </select>
    <select>
      <option>Filter Category</option>
      <option>Laptops</option>
      <option>Accessories</option>
    </select>
  </div>
    </header>
    <main>
        <div>
            <article class="card">
      <div class="card-img"><img src="Images/samsungzfold.jpg" alt="Samsung Z fold 7" width="25%"></div>

      <div class="card-name">
        <h3 class="card-title">Galaxy Z fold 7</h3>
        <div class="price">Ksh.200,000</div>
        <button class="btn" type="button">Add to Cart</button>
      </div>
    </article>
    <article class="card">
      <div class="card-img"><img src="Images/zflip.jpg" alt="Samsung zflip" width="25%"></div>
      <div class="card-name">
        <h3 class="card-title">Samsung galaxy Z flip</h3>
        <div class="price">Ksh. 250,000</div>
        <button class="btn" type="button">Add to Cart</button>
      </div>
    </article>
    <article class="card">
      <div class="card-img"><img src="Images/Iphone17pm.jpg" alt="Iphone 17 Pro Max" width="20%"></div>
      <div class="card-body">
        <h3 class="card-title">Iphone 17 Pro Max</h3>
        <div class="price">Ksh.120,000</div>
        <button class="btn" type="button">Add to Cart</button>
      </div>
    </article>
    <article class="card">
      <div class="card-img"><img src="Images/airpods max.jpg" alt="Apple Airpods Max" width="30%"></div>
      <div class="card-body">
        <h3 class="card-title">Apple Airpods Max</h3>
        <div class="price">Ksh. 80,000</div>
        <button class="btn" type="button">Add to Cart</button>
      </div>
    </article>
        </div>

    </main>
    
</body>
</html>
